url: https://smorabit.github.io/llegir/

# repo already has a docs/ directory for design notes (see navbar link below);
# pkgdown's own default output dir would collide with it, so it's built to
# pkgdown_site/ instead (both docs/ and pkgdown_site/ are .Rbuildignore'd)
destination: pkgdown_site

template:
  bootstrap: 5

home:
  title: llegir
  description: >
    Deterministic evidence and model-assisted interpretation of gene
    co-expression modules.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]

reference:
- title: ModuleSet adapter
  desc: >
    The backend-agnostic contract every core tool depends on -- capabilities()
    plus hdWGCNA/Seurat, tidy-components, and gene-list adapters -- and the
    self-contained synthetic fixture used in examples and the vignette.
  contents:
  - modules
  - gene_membership
  - module_scores
  - expression
  - metadata
  - pkg_versions
  - capabilities
  - has_capability
  - hdWGCNA_ModuleSet
  - components_ModuleSet
  - gene_list_ModuleSet
  - pseudobulk_ModuleSet
  - synthetic_ModuleSet
  - llegir_example_moduleset
  - counts
  - validate_moduleset
  - with_pseudobulk
  - pseudobulk
  - pseudobulk_view

- title: Evidence tools
  desc: Core deterministic evidence tools; each returns one evidence_fragment.
  contents:
  - top_genes_tool
  - cluster_dme_tool
  - geneset_enrichment_tool
  - signature_correlation_tool
  - differential_module_activity_tool
  - pseudobulk_de_limma_tool
  - import_fragment
  - import_fragment_tool
  - import_seurat_markers
  - import_hdwgcna_dme
  - import_enrichr

- title: Dataset tools
  desc: >
    Global, once-per-dataset tools; each returns one dataset_fragment,
    bundled into a dataset_context via run_dataset_context() and injected as
    shared framing into every module's synthesis prompt.
  contents:
  - dataset_composition_tool
  - dataset_variance_structure_tool
  - dataset_baseline_expression_tool

- title: Tool registry
  desc: >
    register_tool() makes tool registration a uniform, documented public API
    for core and custom tools alike; see docs/custom_tools.md.
  contents:
  - register_tool
  - get_tool
  - list_tools

- title: Evidence fragments and packets
  desc: The evidence_fragment / evidence packet data contract.
  contents:
  - evidence_fragment
  - validate_evidence_fragment
  - fragment_to_json
  - fragment_from_json
  - build_evidence_packet
  - packet_to_json
  - write_evidence_packet
  - read_evidence_packet
  - write_fragment_tables
  - make_provenance

- title: Dataset fragments and context
  desc: >
    The dataset_fragment / dataset_context data contract -- the dataset-tool
    sibling of an evidence_fragment / evidence packet, scoped to the whole
    experiment rather than one module.
  contents:
  - dataset_fragment
  - validate_dataset_fragment
  - dataset_fragment_to_json
  - dataset_fragment_from_json
  - build_dataset_context
  - dataset_context_to_json
  - write_dataset_context
  - read_dataset_context
  - render_dataset_context_compact
  - import_dataset_fragment
  - import_dataset_fragment_tool
  - import_milo_da

- title: Orchestration
  desc: Run tools/synthesis over a module set and write results to disk.
  contents:
  - run_module
  - run_orchestrator
  - run_dataset_context
  - synthesize_module
  - run_synthesis_orchestrator

- title: Dataset context and prompts
  contents:
  - dataset_description
  - validate_dataset_description
  - render_dataset_description
  - PROMPT_TEMPLATE_VERSION
  - render_packet_compact
  - build_system_prompt
  - build_user_prompt

- title: Synthesis backends
  desc: Model-agnostic packet -> interpretation synthesis.
  contents:
  - synthesize_interpretation
  - mock_backend
  - ellmer_backend
  - resolve_backend
  - cached_backend
  - model_output_schema_json

- title: Faithfulness and confidence
  desc: Guardrails between the model's output and the deterministic evidence.
  contents:
  - check_faithfulness
  - is_faithful
  - assert_faithfulness
  - enforce_faithfulness
  - compute_evidence_signals
  - calculate_fusion_score
  - fuse_confidence
  - needs_review

- title: Interpretation objects
  contents:
  - interpretation
  - validate_interpretation
  - interpretation_to_json
  - interpretation_from_json
  - interpretation_hash
  - make_interpretation_provenance
  - read_interpretation
  - write_interpretation

- title: Rendering and review
  contents:
  - RENDER_TEMPLATE_VERSION
  - render_paragraph
  - describe_flags
  - build_review_queue
  - write_review_queue
  - build_synthesis_manifest
  - write_synthesis_manifest
  - write_interpretation_report

- title: Statistical helpers
  contents:
  - categorical_group_test
